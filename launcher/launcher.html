<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warframe Companion Launcher Preview</title>
  <link rel="stylesheet" href="launcher.css">
</head>
<body>
  <main class="launcher-stage" aria-label="Standalone launcher preview">
    <section class="warframe-launcher" aria-label="Warframe Companion launcher">
      <div class="launcher-hero" aria-hidden="true"></div>
      <div class="launcher-haze" aria-hidden="true"></div>
      <div class="launcher-left-stack" aria-hidden="true">
        <div class="slash-panel slash-panel-one"></div>
        <div class="slash-panel slash-panel-two"></div>
        <div class="slash-panel slash-panel-three"></div>
      </div>

      <header class="launcher-topbar">
        <div class="launcher-brand">
          <img src="../assets/icon.png" alt="" class="launcher-brand-mark">
          <span class="launcher-brand-text">WARFRAME</span>
        </div>

        <nav class="launcher-tabs" aria-label="Launcher tabs">
          <button class="launcher-tab is-active" type="button">What's New</button>
          <button class="launcher-tab" type="button">Prime Access</button>
          <button class="launcher-tab" type="button">Build Notes</button>
        </nav>

        <div class="launcher-controls" aria-label="Launcher controls">
          <button class="language-button" type="button">
            <span>English</span>
            <span class="control-caret" aria-hidden="true"></span>
          </button>
          <button class="icon-button" type="button" aria-label="Settings">
            <span class="settings-glyph" aria-hidden="true"></span>
          </button>
          <button class="window-button" type="button" aria-label="Minimize">-</button>
          <button class="window-button" type="button" aria-label="Close">x</button>
        </div>
      </header>

      <section class="launcher-copy" aria-label="Featured news">
        <h1>WARFRAME COMPANION<br>LAUNCHER</h1>
        <p>
          Track mastery progress, relic rotations, resources, market data, and smart farming routes from one Tenno-ready desktop hub.
        </p>
      </section>

      <footer class="launcher-actionbar">
        <div class="launcher-status">
          <span class="status-light" aria-hidden="true"></span>
          <span>WARFRAME COMPANION IS UP TO DATE!</span>
        </div>
        <button class="launcher-play" type="button" aria-label="Play Warframe Companion">
          <span>PLAY</span>
        </button>
      </footer>
    </section>
  </main>
</body>
</html>
