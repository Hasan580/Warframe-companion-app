name: Build desktop releases

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to upload assets to (for example v1.4.0)
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_script: build:win
            build_args: ""
            artifact_name: warframe-windows
            artifact_path: |
              dist/*.exe
              dist/*.exe.blockmap
              dist/latest.yml
          - os: ubuntu-latest
            build_script: build:linux
            build_args: ""
            artifact_name: warframe-linux
            artifact_path: |
              dist/*.AppImage
              dist/latest-linux.yml
          - os: macos-latest
            build_script: build:mac
            build_args: --universal
            artifact_name: warframe-macos-universal
            artifact_path: |
              dist/*.dmg
              dist/*.zip
              dist/latest-mac.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.build_script }} -- ${{ matrix.build_args }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release assets
    needs: build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          generate_release_notes: ${{ github.event_name != 'workflow_dispatch' }}
          overwrite_files: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.exe.blockmap
            release-assets/**/latest.yml
            release-assets/**/*.AppImage
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/latest-linux.yml
            release-assets/**/latest-mac.yml
