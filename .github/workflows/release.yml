name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, without v prefix'
        required: true
        default: '1.6.0'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            command: npx electron-builder --win --x64 --publish never
          - platform: linux
            os: ubuntu-latest
            command: npx electron-builder --linux AppImage --x64 --publish never
          - platform: macos-intel
            os: macos-15-intel
            command: npx electron-builder --mac dmg zip --x64 --publish never
          - platform: macos-arm64
            os: macos-latest
            command: npx electron-builder --mac dmg zip --arm64 --publish never

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release assets
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          name: Warframe Companion App ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          make_latest: true
          files: release-assets/*
          body: |
            Warframe Companion App release.

            Includes Windows, macOS, and Linux builds generated by GitHub Actions.
